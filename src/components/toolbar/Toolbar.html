<div id="toolbar">
  <!-- Floating Sidebar Toggle on the edge -->
  <button id="sidebar-toggle-btn" title="Toggle Sidebar">
    <i data-lucide="chevron-left" class="icon-svg sm"></i>
  </button>

  <div class="toolbar-left">
    <div class="logo">
      <div class="logo-icon"><i data-lucide="sparkles" class="icon-svg"></i></div>
      <span class="logo-label">Cognetic</span>
    </div>
  </div>
  <div class="toolbar-center">
    <!-- Important options will be placed here -->
  </div>
  <div class="toolbar-right">
    <button class="icon-btn" title="Settings" id="toolbar-settings-btn">
      <i data-lucide="settings" class="icon-svg"></i>
    </button>
  </div>
</div>
